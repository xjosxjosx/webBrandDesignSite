  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --text-primary: #f0f0f0;
      --text-secondary: #888;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 clamp(16px, 4vw, 48px);
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .site-title {
      font-size: clamp(13px, 1.4vw, 16px);
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .header-right { display: flex; align-items: center; gap: 12px; }

    .agency-count { font-size: 12px; color: var(--text-secondary); letter-spacing: 0.06em; }

    .search-wrap { position: relative; }
    .search-wrap input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 13px;
      padding: 7px 12px 7px 32px;
      width: clamp(140px, 18vw, 220px);
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: #444; }
    .search-wrap input::placeholder { color: var(--text-secondary); }
    .search-icon {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%); opacity: 0.4; pointer-events: none;
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      padding: 14px clamp(16px, 4vw, 48px);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .filter-label {
      font-size: 11px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-secondary); margin-right: 4px;
    }

    .chip {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 12px;
      padding: 5px 14px;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .chip:hover { border-color: #555; color: var(--text-primary); }
    .chip.active { background: var(--text-primary); border-color: var(--text-primary); color: #000; }

    .chip-fav { border-color: rgba(52,199,89,0.35); color: rgba(52,199,89,0.7); }
    .chip-fav:hover { border-color: rgba(52,199,89,0.7); color: #34c759; }
    .chip-fav.active { background: #34c759; border-color: #34c759; color: #fff; }
    .fav-count { font-size: 10px; opacity: 0.8; }

    /* ── GRID ── */
    main { padding: clamp(16px, 3vw, 40px) clamp(16px, 4vw, 48px); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 280px), 1fr));
      gap: clamp(8px, 1.5vw, 16px);
    }

    /* ── CARD ── */
    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: #2e2e2e;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
    }
    .card:hover .visit-btn { opacity: 1; transform: translateY(0); }
    .card:hover .clients-bar { opacity: 1; transform: translateY(0); }

    /* thumbnail area */
    .card-thumb {
      position: relative;
      aspect-ratio: 16/9;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 24px 48px;
      overflow: hidden;
    }

    .logo-text {
      font-size: clamp(16px, 2.8vw, 26px);
      font-weight: 700;
      letter-spacing: -0.02em;
      text-align: center;
      line-height: 1.1;
      transition: transform 0.3s ease;
      word-break: break-word;
      position: relative;
      z-index: 1;
    }
    .card:hover .logo-text { transform: scale(1.05); }

    /* like button */
    .like-btn {
      position: absolute;
      top: 10px; left: 10px;
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      z-index: 3;
      transition: transform 0.15s ease, background 0.2s, border-color 0.2s;
      opacity: 0;
    }
    .card:hover .like-btn { opacity: 1; }
    .like-btn.liked { opacity: 1; background: rgba(255,45,85,0.18); border-color: rgba(255,45,85,0.5); }
    .like-btn:hover { transform: scale(1.15); }
    .like-btn:active { transform: scale(0.9); }

    .like-btn svg { width: 15px; height: 15px; transition: all 0.15s; }
    .like-btn .heart-outline { display: block; }
    .like-btn .heart-fill   { display: none; }
    .like-btn.liked .heart-outline { display: none; }
    .like-btn.liked .heart-fill   { display: block; }

    /* visit overlay */
    .visit-btn {
      position: absolute;
      top: 10px; right: 10px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.18);
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 12px;
      border-radius: 100px;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.2s, transform 0.2s;
      z-index: 2;
    }

    /* clients bar — sits at bottom of thumb */
    .clients-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 10px 12px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0) 100%);
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.22s ease, transform 0.22s ease;
      z-index: 2;
    }

    .client-tag {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 3px 9px;
      border-radius: 100px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.9);
      white-space: nowrap;
      backdrop-filter: blur(4px);
    }

    /* card info */
    .card-info {
      padding: 11px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .card-name { font-size: 13px; font-weight: 600; color: var(--text-primary); line-height: 1.3; }
    .card-meta { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

    .card-rank {
      font-size: 10px; color: var(--text-secondary);
      background: var(--border); border-radius: 4px;
      padding: 2px 6px; white-space: nowrap; flex-shrink: 0;
    }

    .card.hidden { display: none; }

    .empty {
      display: none; text-align: center;
      padding: 80px 20px; color: var(--text-secondary);
      font-size: 14px; grid-column: 1 / -1;
    }
    .empty.show { display: block; }

    footer {
      text-align: center; padding: 40px 20px;
      font-size: 12px; color: var(--text-secondary);
      border-top: 1px solid var(--border);
    }

    @media (max-width: 480px) {
      header { height: 56px; }
      .agency-count { display: none; }
      .search-wrap input { width: 120px; }
    }
  </style>

const grid = document.getElementById('grid');
const searchInput = document.getElementById('searchInput');
const countLabel = document.getElementById('countLabel');
const emptyState = document.getElementById('emptyState');
const chips = document.querySelectorAll('.chip');
const favCount = document.getElementById('favCount');

let activeFilter = 'all';
let favorites = new Set(JSON.parse(localStorage.getItem('favAgencies') || '[]'));

function saveFavs() {
  localStorage.setItem('favAgencies', JSON.stringify([...favorites]));
  updateFavCount();
}

function updateFavCount() {
  const n = favorites.size;
  favCount.textContent = n > 0 ? n : '';
}

function buildCards() {
  agencies.forEach(a => {
    const link = document.createElement('a');
    link.className = 'card';
    link.href = a.url;
    link.target = '_blank';
    link.rel = 'noopener noreferrer';
    link.dataset.region = a.region;
    link.dataset.name = a.name.toLowerCase();
    link.dataset.agencyName = a.name;

    const logoHTML = a.logo.split('\n').join('<br>');
    const clientTags = a.clients.map(c => `<span class="client-tag">${c}</span>`).join('');

    link.innerHTML = `
      <div class="card-thumb" style="background:${a.bg}">
        <button class="like-btn${favorites.has(a.name) ? ' liked' : ''}" data-name="${a.name}" aria-label="즐겨찾기">
          <svg class="heart-outline" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
          <svg class="heart-fill" viewBox="0 0 24 24" fill="#ff2d55" stroke="#ff2d55" stroke-width="2">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </button>
        <div class="logo-text" style="color:${a.color}">${logoHTML}</div>
        <span class="visit-btn">↗ Visit</span>
        <div class="clients-bar">${clientTags}</div>
      </div>
      <div class="card-info">
        <div>
          <div class="card-name">${a.name}</div>
          <div class="card-meta">${a.location} · ${a.specialty}</div>
        </div>
        <span class="card-rank">${a.rank}</span>
      </div>`;

    // like button — stop propagation so card link doesn't fire
    link.querySelector('.like-btn').addEventListener('click', e => {
      e.preventDefault();
      e.stopPropagation();
      const btn = e.currentTarget;
      const name = btn.dataset.name;
      if (favorites.has(name)) {
        favorites.delete(name);
        btn.classList.remove('liked');
        // pop animation
        btn.animate([{transform:'scale(1)'},{transform:'scale(0.8)'},{transform:'scale(1)'}], {duration:200});
      } else {
        favorites.add(name);
        btn.classList.add('liked');
        btn.animate([{transform:'scale(1)'},{transform:'scale(1.4)'},{transform:'scale(1)'}], {duration:260, easing:'ease-out'});
      }
      saveFavs();
      if (activeFilter === 'fav') applyFilters();
    });

    grid.appendChild(link);
  });

  updateFavCount();
  updateCount();
}

function updateCount() {
  const visible = grid.querySelectorAll('.card:not(.hidden)').length;
  countLabel.textContent = `${visible}`;
  emptyState.classList.toggle('show', visible === 0);
}

function applyFilters() {
  const q = searchInput.value.toLowerCase().trim();
  grid.querySelectorAll('.card').forEach(card => {
    let matchRegion;
    if (activeFilter === 'all') matchRegion = true;
    else if (activeFilter === 'fav') matchRegion = favorites.has(card.dataset.agencyName);
    else matchRegion = card.dataset.region === activeFilter;
    const matchSearch = !q || card.dataset.name.includes(q);
    card.classList.toggle('hidden', !(matchRegion && matchSearch));
  });
  updateCount();
}

chips.forEach(chip => {
  chip.addEventListener('click', () => {
    chips.forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = chip.dataset.filter;
    applyFilters();
  });
});

searchInput.addEventListener('input', applyFilters);
buildCards();
</script>
